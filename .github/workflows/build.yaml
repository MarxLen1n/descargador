name: Build ejecutables

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller yt-dlp requests

      - name: Descargar FFmpeg
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" `
            -OutFile "ffmpeg.zip"

          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg

      - name: Preparar FFmpeg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ffmpeg-bin | Out-Null

          Copy-Item ffmpeg\*\bin\ffmpeg.exe ffmpeg-bin\
          Copy-Item ffmpeg\*\bin\ffprobe.exe ffmpeg-bin\

      - name: Compilar aplicación
        shell: pwsh
        run: |
          pyinstaller `
            --onedir `
            --windowed `
            --icon icon.ico `
            --name descargador `
            --add-data "configuracion.json;." `
            --add-binary "ffmpeg-bin\ffmpeg.exe;ffmpeg" `
            --add-binary "ffmpeg-bin\ffprobe.exe;ffmpeg" `
            --collect-all yt_dlp `
            --paths src `
            src\main.py

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: descargador-windows
          path: dist/descargador