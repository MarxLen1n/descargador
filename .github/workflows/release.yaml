name: Build Releases

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [gui, tui]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build Windows ${{ matrix.target }}
        shell: cmd
        run: |
          if "${{ matrix.target }}"=="gui" (
            pyinstaller src/main_gui.py ^
              --onefile ^
              --name descargador-gui-windows ^
              --icon assets/icon.ico ^
              --noconsole ^
              --add-binary "ffmpeg-bin\ffmpeg.exe;ffmpeg" ^
              --add-binary "ffmpeg-bin\ffprobe.exe;ffmpeg"
          ) else (
            pyinstaller src/main_tui.py ^
              --onefile ^
              --name descargador-tui-windows ^
              --icon assets/icon.ico ^
              --add-binary "ffmpeg-bin\ffmpeg.exe;ffmpeg" ^
              --add-binary "ffmpeg-bin\ffprobe.exe;ffmpeg"
          )

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.target }}
          path: dist/*

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [gui, tui]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build Linux ${{ matrix.target }}
        run: |
          if [ "${{ matrix.target }}" = "gui" ]; then
            pyinstaller src/main_gui.py \
              --onefile \
              --name descargador-gui-linux \
              --icon assets/icon.ico \
              --noconsole
          else
            pyinstaller src/main_tui.py \
              --onefile \
              --name descargador-tui-linux \
              --icon assets/icon.ico
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: dist/*

  release:
    needs:
      - build-windows
      - build-linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}